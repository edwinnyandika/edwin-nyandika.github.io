<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2">
    <title>Auth App - Register</title>
</head>
<body>

    <h1>Auth App</h1>

    <nav>
      <button type="button"><a href="register.html">Register</a></button> |
      <button type="button"><a href="login.html">Login</a></button> |
      <button type="button"><a href="dashboard.html">Dashboard</a></button>
    </nav>

    <hr>

    <h2>Register</h2>

    <form>

        <label for="firstname">First Name:</label><br>
        <input type="text" id="firstname" name="firstname" placeholder="Enter your first name"><br><br>

        <label for="lastname">Last Name:</label><br>
        <input type="text" id="lastname" name="lastname" placeholder="Enter your last name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>

        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" placeholder="Choose a username"><br><br>

        <label for="gender">Gender:</label><br>
        <select id="gender" name="gender">
            <option value="">-- Select Gender --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Create a password"><br><br>

        <label for="confirm">Confirm Password:</label><br>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat your password"><br><br>

        <button type="submit">Register</button>

    </form>

    <hr>

    <p>Already have an account? <a href="login.html">Login here</a></p>

</body>
</html>
